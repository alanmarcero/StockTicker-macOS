<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMA Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  button, input { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    line-height: 1.5;
  }

  .banner {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    font-size: 13px;
  }

  .banner h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e6edf3;
    margin-right: auto;
  }

  .banner .meta { color: #8b949e; white-space: nowrap; }
  .banner .meta strong { color: #c9d1d9; font-weight: 500; }
  .meta-sep { margin: 0 6px; color: #30363d; }
  #meta { display: flex; flex-wrap: wrap; align-items: center; gap: 2px 0; }

  .meta-link { color: #8b949e; text-decoration: none; }
  .meta-link:hover { color: #58a6ff; text-decoration: underline; }

  .tabs {
    display: flex;
    gap: 0;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 0 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .tab {
    padding: 10px 20px;
    min-height: 44px;
    display: flex;
    align-items: center;
    cursor: pointer;
    font-size: 14px;
    color: #8b949e;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    user-select: none;
  }

  .tab:hover { color: #c9d1d9; }

  .tab.active {
    color: #e6edf3;
    border-bottom-color: #f78166;
  }

  .tab .count {
    margin-left: 6px;
    font-size: 12px;
    background: #30363d;
    color: #8b949e;
    padding: 1px 7px;
    border-radius: 10px;
  }

  .tab.active .count {
    background: #f7816633;
    color: #f78166;
  }

  /* Source toggles */
  .source-toggles {
    display: flex;
    gap: 8px;
    padding: 10px 24px;
    background: #0d1117;
    flex-wrap: wrap;
    align-items: center;
  }

  .source-group {
    display: contents;
  }

  .source-btn {
    padding: 5px 14px;
    min-height: 32px;
    border-radius: 16px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    white-space: nowrap;
  }

  .source-btn:hover { border-color: #58a6ff; color: #c9d1d9; }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 24px 2px;
    background: #0d1117;
    font-size: 13px;
    flex-wrap: wrap;
  }

  .row-count { color: #8b949e; }

  .quick-btn, .reset-btn {
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: #f85149; color: #f85149; }

  .quick-sep {
    width: 1px;
    height: 18px;
    background: #30363d;
    margin: 0 2px;
  }

  .quick-btn:hover { border-color: #58a6ff; color: #c9d1d9; }

  .source-btn.active, .quick-btn.active {
    background: #1f6feb33;
    border-color: #58a6ff;
    color: #58a6ff;
  }

  .content { padding: 16px 24px; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid #30363d;
    border-radius: 6px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th {
    background: #161b22;
    color: #8b949e;
    font-weight: 500;
    text-align: left;
    padding: 8px 16px;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  th:hover { color: #c9d1d9; }

  th .sort-arrow {
    margin-left: 4px;
    font-size: 11px;
    opacity: 0.4;
  }

  th.sorted .sort-arrow { opacity: 1; color: #f78166; }

  td {
    padding: 6px 16px;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #161b22; }

  /* Row striping */
  tbody tr:nth-child(odd) td { background: #0d1117; }
  tbody tr:nth-child(even) td { background: #111820; }
  tbody tr:hover td { background: #161b22; }

  td.symbol { font-weight: 600; color: #e6edf3; }
  td.symbol a { color: #e6edf3; text-decoration: none; }
  td.symbol a:hover { color: #f78166; }

  /* Color coding */
  .pct-positive { color: #3fb950; }
  .pct-negative { color: #f85149; }
  .close-above { color: #3fb950; }
  .close-below { color: #f85149; }

  .filter-row td {
    padding: 4px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    position: sticky;
    top: 33px;
    z-index: 1;
  }

  .filter-row input {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    font-size: 12px;
    padding: 3px 6px;
    min-height: 36px;
    outline: none;
  }

  .filter-row input:focus { border-color: #58a6ff; }
  .filter-row input.filter-symbol { width: 100%; }

  .filter-row input.filter-num {
    width: 54px;
    min-height: 36px;
    text-align: center;
    -moz-appearance: textfield;
  }

  .filter-row input.filter-num::-webkit-inner-spin-button,
  .filter-row input.filter-num::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .num-filter-group {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid #30363d;
    border-radius: 4px;
    overflow: hidden;
    height: 36px;
  }

  .num-filter-group input {
    border: none !important;
    border-radius: 0 !important;
    border-left: 1px solid #30363d !important;
    border-right: 1px solid #30363d !important;
    min-height: unset !important;
    height: 100%;
  }

  .num-filter-group input:focus {
    border-color: #58a6ff !important;
    z-index: 1;
    position: relative;
  }

  .spin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    background: #161b22;
    color: #8b949e;
    border: none;
    cursor: pointer;
    font-size: 14px;
    user-select: none;
    transition: background 0.1s, color 0.1s;
    padding: 0;
    flex-shrink: 0;
  }

  .spin-btn:hover { background: #30363d; color: #e6edf3; }
  .spin-btn:active { background: #58a6ff33; color: #58a6ff; }

  .filter-row .num-filters {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.num { text-align: right; }

  .loading {
    text-align: center;
    padding: 48px;
    color: #8b949e;
    font-size: 15px;
  }

  .error-msg {
    text-align: center;
    padding: 48px;
    color: #f85149;
    font-size: 15px;
  }

  @media (max-width: 640px) {
    .banner {
      padding: 8px 10px;
      gap: 4px;
      flex-direction: column;
      align-items: flex-start;
    }
    .banner h1 { font-size: 14px; margin-right: 0; }
    .banner .meta { font-size: 11px; }
    .tabs { padding: 0 6px; gap: 0; }
    .tab { padding: 6px 10px; font-size: 12px; min-height: 36px; }
    .tab .count { font-size: 10px; margin-left: 4px; padding: 1px 5px; }
    .source-toggles { padding: 4px 6px; gap: 4px 5px; }
    .source-group { display: flex; gap: 4px; flex-wrap: wrap; width: 100%; }
    .source-btn { padding: 3px 8px; font-size: 10px; min-height: 26px; border-radius: 14px; }
    .toolbar { padding: 4px 8px 2px; gap: 6px; font-size: 12px; }
    .reset-btn, .quick-btn { font-size: 11px; padding: 4px 10px; min-height: 30px; }
    .quick-sep { display: none; }
    .meta-sep { margin: 0 4px; }
    .content { padding: 4px 2px; }
    table { font-size: 12px; }
    th { padding: 5px 4px; }
    td { padding: 4px 4px; }
    td.symbol { max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
    .col-ema { display: none; }
    .filter-row td { padding: 3px 2px; position: static; }
    .filter-row .num-filters { gap: 3px; }
    .filter-row .num-filters-stacked { flex-direction: column; gap: 3px; }
    .num-filter-group { height: 30px; }
    .spin-btn { width: 22px; font-size: 12px; }
    .filter-row input.filter-num { width: 36px; font-size: 11px; padding: 2px 2px; }
    .filter-row input.filter-symbol { font-size: 11px; min-height: 30px; }
    .table-wrap { border-radius: 4px; border-left: none; border-right: none; }
  }

  @media (max-width: 480px) {
    .banner { padding: 6px 8px; }
    .banner h1 { font-size: 13px; }
    .tabs { padding: 0 4px; }
    .tab { padding: 4px 6px; font-size: 11px; min-height: 32px; }
    .tab .count { font-size: 9px; padding: 0 4px; }
    .source-toggles { padding: 3px 3px; gap: 3px; }
    .source-group { gap: 3px; }
    .source-btn { padding: 2px 5px; font-size: 9px; min-height: 24px; }
    .toolbar { padding: 3px 4px 2px; }
    .content { padding: 2px 0; }
    table { font-size: 11px; }
    th { padding: 4px 3px; font-size: 11px; }
    td { padding: 3px 3px; }
    .filter-row td { padding: 2px 2px; position: static; }
    .num-filter-group { height: 28px; }
    .spin-btn { width: 20px; font-size: 11px; }
    .filter-row input.filter-num { width: 30px; font-size: 10px; }
    .filter-row input.filter-symbol { font-size: 10px; min-height: 28px; }
  }
</style>
</head>
<body>

<div class="banner">
  <h1>EMA Scanner</h1>
  <div id="meta"></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="source-toggles" id="source-toggles"></div>
<div class="source-toggles" id="week-selector" style="display:none"></div>
<div class="toolbar" id="toolbar"></div>
<div class="content" id="content">
  <div class="loading">Loading scan data&hellip;</div>
</div>

<script>
const MEGA_CAP = new Set(['AAPL','ABBV','ABT','ACN','ADBE','AMD','AMGN','AMZN','AVGO','AXP','BA','BAC','BRK-B','BX','CAT','CI','CMCSA','COP','COST','CRM','CRWD','CSCO','CVX','DE','DHR','DIS','ETN','GE','GEV','GILD','GOOG','GOOGL','GS','HD','HON','IBM','INTC','INTU','ISRG','JNJ','JPM','KO','LIN','LLY','LMT','LOW','MA','MCD','MDLZ','MRK','MS','MSFT','MU','NEE','NFLX','NKE','NOW','NVDA','ORCL','PEP','PFE','PG','PGR','PLTR','PM','PYPL','QCOM','RTX','SBUX','SCHW','SHW','SPGI','T','TJX','TMO','TMUS','TSLA','TXN','UNH','UNP','UPS','V','VRTX','VZ','WFC','WMT','XOM']);

const TOP_AUM = new Set(['SPY','IVV','VOO','VTI','QQQ','VEA','VTV','IEFA','BND','AGG','VWO','IWM','IEMG','VIG','VUG','IJR','VXUS','GLD','IJH','SCHD','VGT','XLK','BNDX','VO','IWF','VCIT','XLV','ITOT','BSV','DIA']);
const TOP_VOL = new Set(['SPY','QQQ','IWM','EEM','XLF','HYG','SMH','GDX','SLV','IBIT']);
const SPDR = new Set(['SPY','GLD','SPLG','XLK','XLF','DIA','SPYG','BIL','XLV','XLE','SPDW','GLDM','SPYV','XLI','XLC','MDY','XLU','XLY','SDY','XLP','SPEM','SPMD','SPSM','SPTM','SPTL','SPIB','SPHY','SPTI','SPAB','SPSB','XBI','XLRE','JNK','SPYD','XLB','SPMB','XAR','SPTS','CWB','SRLN','FEZ','SJNK','GNR','XME','SLYV','SLYG','TOTL','BILS','KRE','SHM','TFI','HYMB','FLRN','MDYG','CWI','MDYV','XOP','KOMP','SPYX','EBND','SPBO','TIPX','RWR','XHB','XSD','BWX','QUS','XNTK','SPGM']);
const VANGUARD = new Set(['VOO','VTI','VEA','VUG','VTV','BND','VXUS','VWO','VGT','VIG','VO','BNDX','VYM','VB','VCIT','VT','VEU','VV','BSV','VTEB','VCSH','VGIT','VONG','VNQ','VBR','VGK','MGK','BIV','VGSH','VXF','VOE','VOOG','VBK','VYMI','VOT','VHT','VONV','VTIP','VMBS','VTWO','VFH','MGV','VSS','ESGV','VGLT','MGC','VDE','VIGI','VPL','VPU','VDC','VUSB']);

const SPDR_SECTORS = new Set(['SPY','XLE','XLK','XLB','XLV','XLY','XLI','XLC','XLU','XLF','XLRE','XLP']);
const INDEX_SYMBOLS = new Set(['SPY','QQQ','DIA','IWM']);
const VANECK_ETFS = new Set(['GDX','GDXJ','MOAT','MOO','MORT','REMX','SMH','SMOG']);
const WISDOMTREE_ETFS = new Set(['DGRW','DXJ','WCLD','WTV']);
const GLOBALX_ETFS = new Set(['AIQ','BKCH','BOTZ','BUG','CLOU','COPX','CTEC','DIV','DRIV','EBIZ','EDOC','FINX','GNOM','HERO','LIT','MLPX','POTX','SOCL','URA']);
const ROUNDHILL_ETFS = new Set(['BETZ','BYTE','CHAT','MEME','NERD','WEED']);
const COMMODITY_ETFS = new Set(['GLD','SLV','PPLT','PALL','GDX','GDXJ','SIL','COPX','RING','XME','IBIT','ETHE']);
const SECTOR_ETFS = new Set(['ARKF','ARKG','ARKK','ARKQ','ARKW','BITQ','BLOK','CIBR','CNCR','CQQQ','DFEN','EEM','FAN','FDIS','FDN','FHLC','FTEC','GRID','HACK','IBB','IBIT','ICLN','IFRA','IGV','IHF','IHI','ITA','ITB','IYE','IYF','IYH','IYR','IYT','IYW','IYZ','IZRL','JETS','KBE','KIE','KRE','KWEB','MJ','MSOS','ONLN','PAVE','PBE','PBW','PHO','PJP','PPH','PRNT','PSCT','PSI','QCLN','QQQJ','QTEC','ROBO','SKYY','SLV','SOXQ','SOXX','TAN','URNM','WOOD','XAR','XBI','XHB','XHE','XLB','XLC','XLE','XLF','XLI','XLK','XLP','XLRE','XLU','XLV','XLY','XME','XNTK','XOP','XRT','XSD','XSW','YOLO']);

const CAP_FILTERS = ['all', 'small', 'mega'];
const ETF_FILTERS = ['topAUM', 'topVol', 'spdr', 'spdrSectors', 'vanguard', 'vaneck', 'wisdomTree', 'globalX', 'roundhill', 'commodities', 'sector'];

const SOURCE_DEFS = {
  all:        { label: 'All' },
  none:       { label: 'None' },
  small:      { label: '$200B\u2212',  set: null, match: s => !MEGA_CAP.has(s) },
  mega:       { label: '$200B+',       set: MEGA_CAP },
  topAUM:     { label: 'Top AUM',      set: TOP_AUM },
  topVol:     { label: 'Top Vol',      set: TOP_VOL },
  spdr:       { label: 'SPDR',         set: SPDR },
  spdrSectors:{ label: 'Sectors',     set: SPDR_SECTORS },
  vanguard:   { label: 'Vanguard',     set: VANGUARD },
  vaneck:     { label: 'VanEck',       set: VANECK_ETFS },
  wisdomTree: { label: 'WisdomTree',   set: WISDOMTREE_ETFS },
  globalX:    { label: 'Global X',     set: GLOBALX_ETFS },
  roundhill:  { label: 'Roundhill',    set: ROUNDHILL_ETFS },
  commodities:{ label: 'Commodities', set: COMMODITY_ETFS },
  sector:     { label: 'Other ETFs',   set: SECTOR_ETFS },
};

const SOURCE_ORDER = ['all', 'none', 'small', 'mega', 'topAUM', 'topVol', 'spdr', 'spdrSectors', 'vanguard', 'vaneck', 'wisdomTree', 'globalX', 'roundhill', 'commodities', 'sector'];

const DEFAULT_FILTERS = {
  close: { min: 10 },
  count: { min: 5 },
  weeksBelow: { min: 6 },
  weeksAbove: { min: 5 },
  monthsBelow: { min: 4 },
  monthsAbove: { min: 3 },
  pct: { min: 3 },
};

const TAB_DEFS = [
  { id: 'crossovers',  label: 'Wk Cross Up',   file: '/results/latest.json',                      key: 'crossovers',      cols: ['symbol','close','weeksBelow','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],   pctField: 'pctAbove' },
  { id: 'crossdowns',  label: 'Wk Cross Down',  file: '/results/latest-crossdown.json',             key: 'crossdowns',      cols: ['symbol','close','weeksAbove','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],   pctField: 'pctBelow' },
  { id: 'weekBelow',   label: 'Wk Below',       file: '/results/latest-below.json',                 key: 'weekBelow',       cols: ['symbol','close','count','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],        pctField: 'pctBelow' },
  { id: 'weekAbove',   label: 'Wk Above',       file: '/results/latest-above.json',                 key: 'weekAbove',       cols: ['symbol','close','count','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],        pctField: 'pctAbove' },
  { id: 'dayBelow',    label: 'Day Below',      file: '/results/latest-below.json',                 key: 'dayBelow',        cols: ['symbol','close','count','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],        pctField: 'pctBelow' },
  { id: 'dayAbove',    label: 'Day Above',      file: '/results/latest-above.json',                 key: 'dayAbove',        cols: ['symbol','close','count','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],        pctField: 'pctAbove' },
  { id: 'moCrossUp',   label: 'Mo Cross Up',    file: '/results/latest-monthly.json',               key: 'monthCrossovers', cols: ['symbol','close','monthsBelow','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],  pctField: 'pctAbove' },
  { id: 'moCrossDown', label: 'Mo Cross Down',  file: '/results/latest-monthly.json',               key: 'monthCrossdowns', cols: ['symbol','close','monthsAbove','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],  pctField: 'pctBelow' },
  { id: 'moBelow',     label: 'Mo Below',       file: '/results/latest-monthly-below-above.json',   key: 'monthBelow',      cols: ['symbol','close','count','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],        pctField: 'pctBelow' },
  { id: 'moAbove',     label: 'Mo Above',       file: '/results/latest-monthly-below-above.json',   key: 'monthAbove',      cols: ['symbol','close','count','pct','ema','ytdPct','highPct','lowPct','rsi','forwardPE'],        pctField: 'pctAbove' },
  { id: 'performance', label: 'Performance',     special: 'performance' },
  { id: 'priceBreaks', label: 'Price Breaks',   special: 'priceBreaks' },
  { id: 'sinceQ',      label: 'Since Quarter',  special: 'sinceQuarter' },
  { id: 'duringQ',     label: 'During Quarter', special: 'duringQuarter' },
  { id: 'fwdPE',       label: 'Forward P/E',    special: 'forwardPE' },
  { id: 'vixSpikes',   label: 'VIX Spikes',     special: 'vixSpikes' },
  { id: 'miscStats',   label: 'Misc Stats',     special: 'miscStats' },
];

const COL_LABELS = {
  symbol: 'Symbol', close: 'Close', ema: 'EMA', pct: '% EMA',
  weeksBelow: 'Weeks Below', weeksAbove: 'Weeks Above',
  monthsBelow: 'Months Below', monthsAbove: 'Months Above',
  count: 'Count',
  ytdPct: 'YTD', highPct: 'vs High', high3yr: '3yr High', lowPct: 'vs Low', low52wk: '52wk Low',
  rsi: 'RSI', forwardPE: 'Fwd P/E',
  breakoutPct: 'Breakout %', breakdownPct: 'Breakdown %',
  breakoutPrice: 'Breakout', breakdownPrice: 'Breakdown',
  breakoutDate: 'Date', breakdownDate: 'Date',
  spikeClose: 'Spike Close', pctGain: '% Gain',
};

const NUM_COLS = new Set(['close','ema','pct','weeksBelow','weeksAbove','monthsBelow','monthsAbove','count','ytdPct','highPct','high3yr','lowPct','low52wk','rsi','forwardPE','breakoutPct','breakdownPct','breakoutPrice','breakdownPrice','spikeClose','pctGain']);

const state = {
  activeSourceMode: 'all',
  data: {},
  statsMap: {},
  activeTab: TAB_DEFS[0].id,
  sortCol: null,
  sortAsc: true,
  filters: {},
  lowSignalActive: true,
  activeQuickFilters: new Set(),
  activeColorFilters: new Set(),
  manifest: [],
  selectedWeek: 'latest',
};

/* ── Hash persistence ── */

function readHash() {
  const h = location.hash.replace('#', '');
  if (h && TAB_DEFS.some(t => t.id === h)) state.activeTab = h;
}

function writeHash() {
  history.replaceState(null, '', '#' + state.activeTab);
}

/* ── Source toggles ── */

function isSourceActive(id) {
  if (state.activeSourceMode === 'all') return id === 'all';
  if (state.activeSourceMode === 'none') return id === 'none';
  return state.activeSourceMode.has(id);
}

function renderSourceToggles() {
  const el = document.getElementById('source-toggles');
  const capIds = ['all', 'none', 'small', 'mega'];
  const etfIds = SOURCE_ORDER.filter(id => !capIds.includes(id));
  const btnHTML = ids => ids.map(id => {
    const cls = isSourceActive(id) ? ' active' : '';
    return `<button class="source-btn${cls}" data-src="${id}">${SOURCE_DEFS[id].label}</button>`;
  }).join('');
  el.innerHTML =
    `<div class="source-group">${btnHTML(capIds)}</div>` +
    `<div class="source-group">${btnHTML(etfIds)}</div>`;
  el.querySelectorAll('.source-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      const id = btn.dataset.src;
      if (id === 'all') {
        state.activeSourceMode = 'all';
      } else if (id === 'none') {
        state.activeSourceMode = 'none';
      } else if (CAP_FILTERS.includes(id)) {
        // Cap filters are exclusive (radio-style), clear ETF selections
        state.activeSourceMode = new Set([id]);
      } else {
        // ETF filters toggle on/off, clear cap selections
        let cur = (state.activeSourceMode instanceof Set) ? new Set(state.activeSourceMode) : new Set();
        // Remove any cap filters
        CAP_FILTERS.forEach(c => cur.delete(c));
        if (cur.has(id)) cur.delete(id);
        else cur.add(id);
        state.activeSourceMode = cur.size > 0 ? cur : 'all';
      }
      renderSourceToggles();
      renderTabs();
      showTab(state.activeTab);
    })
  );
}

function matchesSources(symbol) {
  if (state.activeSourceMode === 'all') return true;
  if (state.activeSourceMode === 'none') return false;
  for (const id of state.activeSourceMode) {
    const def = SOURCE_DEFS[id];
    if (def.match) { if (def.match(symbol)) return true; }
    else if (def.set) { if (def.set.has(symbol)) return true; }
  }
  return false;
}

/* ── Default filters ── */

function applyLowSignalFilters() {
  for (const [c, def] of Object.entries(DEFAULT_FILTERS)) {
    state.filters[c] = { ...def };
  }
}

function initDefaultFilters() {
  state.filters = {};
  state.activeQuickFilters.clear();
  state.lowSignalActive = true;
  applyLowSignalFilters();
}

function clearAllFilters() {
  state.filters = {};
  state.activeQuickFilters.clear();
  state.activeColorFilters.clear();
  state.lowSignalActive = false;
}

/* ── Quick filters ── */

const QUICK_FILTERS = [
  { id: 'low',  label: 'Low $',  col: 'close', values: { min: 3, max: 20 } },
  { id: 'mid',  label: 'Mid $',  col: 'close', values: { min: 20, max: 300 } },
  { id: 'high', label: 'High $', col: 'close', values: { min: 300, max: '' } },
];

const COLOR_FILTERS = [
  { id: 'ytdGreen',  label: 'YTD+',      test: r => r.ytdPct != null && r.ytdPct >= 0 },
  { id: 'ytdRed',    label: 'YTD\u2212',  test: r => r.ytdPct != null && r.ytdPct < 0 },
  { id: 'nearHigh',  label: 'Near High',  test: r => r.highPct != null && r.highPct >= -5 },
  { id: 'offHigh',   label: 'Off High',   test: r => r.highPct != null && r.highPct < -5 },
  { id: 'offLow',    label: 'Off Low',    test: r => r.lowPct != null && r.lowPct > 5 },
  { id: 'nearLow',   label: 'Near Low',   test: r => r.lowPct != null && r.lowPct <= 5 },
];

const COLOR_FILTERS_MAP = new Map(COLOR_FILTERS.map(cf => [cf.id, cf]));

/* ── Toolbar ── */

function renderToolbar(filteredCount, totalCount) {
  const el = document.getElementById('toolbar');
  const quickBtns = QUICK_FILTERS.map(qf => {
    const cls = state.activeQuickFilters.has(qf.id) ? ' active' : '';
    return `<button class="quick-btn${cls}" data-qf="${qf.id}">${qf.label}</button>`;
  }).join('');

  const colorBtns = COLOR_FILTERS.map(cf => {
    const cls = state.activeColorFilters.has(cf.id) ? ' active' : '';
    return `<button class="quick-btn${cls}" data-cf="${cf.id}">${cf.label}</button>`;
  }).join('');

  const lsCls = state.lowSignalActive ? ' active' : '';
  el.innerHTML =
    `<span class="row-count">Showing <strong>${filteredCount}</strong> of <strong>${totalCount}</strong></span>` +
    `<button class="quick-btn${lsCls}" id="low-signal-btn">Filter Low Signal</button>` +
    `<button class="reset-btn" id="clear-filters-btn">Remove Filters</button>` +
    `<div class="quick-sep"></div>` +
    quickBtns +
    `<div class="quick-sep"></div>` +
    colorBtns;

  document.getElementById('low-signal-btn').addEventListener('click', () => {
    state.lowSignalActive = !state.lowSignalActive;
    if (state.lowSignalActive) {
      applyLowSignalFilters();
    } else {
      // Remove only the default filter keys, keep user-set filters
      for (const c of Object.keys(DEFAULT_FILTERS)) {
        delete state.filters[c];
      }
    }
    state.activeQuickFilters.clear();
    renderTabs();
    showTab(state.activeTab);
  });
  document.getElementById('clear-filters-btn').addEventListener('click', () => {
    clearAllFilters();
    renderTabs();
    showTab(state.activeTab);
  });
  el.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qfId = btn.dataset.qf;
      const cfId = btn.dataset.cf;
      if (qfId) {
        const qf = QUICK_FILTERS.find(q => q.id === qfId);
        if (state.activeQuickFilters.has(qfId)) {
          state.activeQuickFilters.delete(qfId);
          if (DEFAULT_FILTERS[qf.col]) {
            state.filters[qf.col] = { ...DEFAULT_FILTERS[qf.col] };
          } else {
            delete state.filters[qf.col];
          }
        } else {
          QUICK_FILTERS.filter(q => q.col === qf.col && q.id !== qfId)
            .forEach(q => state.activeQuickFilters.delete(q.id));
          state.activeQuickFilters.add(qfId);
          state.filters[qf.col] = { ...qf.values };
        }
      } else if (cfId) {
        if (state.activeColorFilters.has(cfId)) {
          state.activeColorFilters.delete(cfId);
        } else {
          state.activeColorFilters.add(cfId);
        }
      }
      renderTabs();
      showTab(state.activeTab);
    });
  });
}

/* ── Sorting ── */

function sortRows(rows) {
  if (!state.sortCol) return rows;
  return rows.sort((a, b) => {
    const av = a[state.sortCol], bv = b[state.sortCol];
    if (typeof av === 'number' && typeof bv === 'number') return state.sortAsc ? av - bv : bv - av;
    return state.sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
}

/* ── Filtering ── */

function applyFilters(rows, cols) {
  return rows.filter(r => {
    if (!matchesSources(r.symbol)) return false;
    for (const c of cols) {
      const f = state.filters[c];
      if (!f) continue;
      if (c === 'symbol') {
        if (f.text && !String(r[c]).toLowerCase().includes(f.text.toLowerCase())) return false;
      } else {
        const v = r[c];
        if (v == null) return false;
        if (f.min !== '' && f.min != null && v < Number(f.min)) return false;
        if (f.max !== '' && f.max != null && v > Number(f.max)) return false;
      }
    }
    for (const cfId of state.activeColorFilters) {
      const cf = COLOR_FILTERS_MAP.get(cfId);
      if (cf && !cf.test(r)) return false;
    }
    return true;
  });
}

/* ── Row rendering ── */

function renderRowHTML(r, cols, pctField, tabId) {
  return '<tr>' + cols.map(c => {
    const v = r[c];
    const ema = c === 'ema' ? ' col-ema' : '';
    if (c === 'symbol') {
      const interval = tabId.startsWith('mo') ? 'M' : 'W';
      const url = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(v)}&interval=${interval}`;
      return `<td class="symbol"><a href="${url}" target="_blank">${esc(v)}</a></td>`;
    }
    if (c === 'pct') {
      const cls = v > 0 ? 'pct-positive' : v < 0 ? 'pct-negative' : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    if (c === 'close') {
      const cls = r.close > r.ema ? 'close-above' : r.close < r.ema ? 'close-below' : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    if (c === 'ytdPct' || c === 'highPct' || c === 'lowPct') {
      const green = c === 'ytdPct' ? v >= 0 : c === 'highPct' ? v >= -5 : v > 5;
      const cls = v != null ? (green ? 'pct-positive' : 'pct-negative') : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    if (c === 'rsi' && v != null) {
      const cls = v > 70 ? 'pct-negative' : v < 30 ? 'pct-positive' : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    if (c === 'breakoutPct' || c === 'breakdownPct' || c === 'pctGain') {
      const cls = v != null ? (v >= 0 ? 'pct-positive' : 'pct-negative') : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    if (NUM_COLS.has(c)) return `<td class="num${ema}">${fmtNum(c, v)}</td>`;
    return `<td>${esc(v)}</td>`;
  }).join('') + '</tr>';
}

function renderTbodyHTML(rows, cols, pctField, tabId) {
  if (rows.length === 0) {
    return `<tr><td colspan="${cols.length}" style="text-align:center;padding:24px;color:#8b949e">No data</td></tr>`;
  }
  return rows.map(r => renderRowHTML(r, cols, pctField, tabId)).join('');
}

/* ── Tabs ── */

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TAB_DEFS.map(t => {
    let countText;
    if (t.special === 'miscStats') {
      countText = '';
    } else if (t.special) {
      const rows = state.data[t.id] || [];
      const total = rows.filter(r => matchesSources(r.symbol)).length;
      countText = `${total}`;
    } else {
      const total = state.data[t.id] ? state.data[t.id].filter(r => matchesSources(r.symbol)).length : 0;
      const filtered = state.data[t.id] ? applyFilters(state.data[t.id], t.cols).length : 0;
      const isActive = t.id === state.activeTab;
      const hasFilter = isActive && Object.keys(state.filters).length > 0 &&
        Object.values(state.filters).some(f => f.text || (f.min !== '' && f.min != null) || (f.max !== '' && f.max != null));
      countText = hasFilter ? `${filtered} / ${total}` : `${total}`;
    }
    const isActive = t.id === state.activeTab;
    const countSpan = countText ? `<span class="count">${countText}</span>` : '';
    return `<div class="tab${isActive ? ' active' : ''}" data-tab="${t.id}">` +
      `${t.label}${countSpan}</div>`;
  }).join('');
  el.querySelectorAll('.tab').forEach(tab =>
    tab.addEventListener('click', () => {
      state.activeTab = tab.dataset.tab;
      state.sortCol = null;
      state.sortAsc = true;
      writeHash();
      renderTabs();
      showTab(state.activeTab);
    })
  );
}

/* ── Table building helpers ── */

function renderTableHeader(def) {
  return def.cols.map(c => {
    const isSorted = state.sortCol === c;
    const arrow = isSorted ? (state.sortAsc ? '\u25B2' : '\u25BC') : '\u25B4';
    const cls = [NUM_COLS.has(c) ? 'num' : '', isSorted ? 'sorted' : '', c === 'ema' ? 'col-ema' : ''].filter(Boolean).join(' ');
    return `<th class="${cls}" data-col="${c}">${COL_LABELS[c]}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');
}

function renderFilterRow(def) {
  return def.cols.map(c => {
    const emaClass = c === 'ema' ? ' col-ema' : '';
    if (c === 'symbol') {
      const val = state.filters[c]?.text || '';
      return `<td${emaClass ? ` class="${emaClass.trim()}"` : ''}><input type="text" class="filter-symbol" data-col="${c}" placeholder="Filter\u2026" value="${esc(val)}"></td>`;
    }
    const f = state.filters[c] || {};
    const minVal = f.min != null ? f.min : '';
    const stackClass = c === 'close' ? ' num-filters-stacked' : '';
    let cell = `<td class="num${emaClass}"><div class="num-filters${stackClass}">` +
      `<div class="num-filter-group">` +
        `<button class="spin-btn" data-col="${c}" data-bound="min" data-dir="-1">&#x2212;</button>` +
        `<input type="number" class="filter-num" data-col="${c}" data-bound="min" placeholder="min" value="${minVal}">` +
        `<button class="spin-btn" data-col="${c}" data-bound="min" data-dir="1">+</button>` +
      `</div>`;
    if (c === 'close') {
      const maxVal = f.max != null ? f.max : '';
      cell +=
        `<div class="num-filter-group">` +
          `<button class="spin-btn" data-col="${c}" data-bound="max" data-dir="-1">&#x2212;</button>` +
          `<input type="number" class="filter-num" data-col="${c}" data-bound="max" placeholder="max" value="${maxVal}">` +
          `<button class="spin-btn" data-col="${c}" data-bound="max" data-dir="1">+</button>` +
        `</div>`;
    }
    return cell + `</div></td>`;
  }).join('');
}

function renderTableBody(def, rows, tabId) {
  return renderTbodyHTML(rows, def.cols, def.pctField, tabId);
}

function attachFilterListeners(def, tabId) {
  document.querySelectorAll('th[data-col]').forEach(th =>
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (state.sortCol === col) state.sortAsc = !state.sortAsc;
      else { state.sortCol = col; state.sortAsc = NUM_COLS.has(col) ? false : true; }
      showTab(tabId);
    })
  );

  document.querySelectorAll('.filter-row input').forEach(input => {
    input.addEventListener('input', () => {
      const col = input.dataset.col;
      const bound = input.dataset.bound;
      if (col === 'symbol') {
        if (!state.filters[col]) state.filters[col] = {};
        state.filters[col].text = input.value;
      } else {
        if (!state.filters[col]) state.filters[col] = {};
        state.filters[col][bound] = input.value;
      }
      state.lowSignalActive = false;
      renderTabs();
      updateRows(tabId);
    });
  });

  document.querySelectorAll('.spin-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col;
      const bound = btn.dataset.bound;
      const dir = Number(btn.dataset.dir);
      if (!state.filters[col]) state.filters[col] = {};
      const cur = Number(state.filters[col][bound]) || 0;
      const step = col === 'pct' ? 1 : 1;
      state.filters[col][bound] = cur + dir * step;
      const input = btn.closest('.num-filter-group').querySelector('input');
      if (input) input.value = state.filters[col][bound];
      state.lowSignalActive = false;
      renderTabs();
      updateRows(tabId);
    });
  });
}

/* ── Main tab display ── */

function showTab(tabId) {
  const def = TAB_DEFS.find(t => t.id === tabId);

  if (def.special) {
    showSpecialTab(def);
    return;
  }

  const allRows = state.data[tabId] || [];
  let rows = applyFilters([...allRows], def.cols);
  sortRows(rows);

  const totalSourced = allRows.filter(r => matchesSources(r.symbol)).length;
  renderToolbar(rows.length, totalSourced);

  const ths = renderTableHeader(def);
  const filterCells = renderFilterRow(def);
  const body = renderTableBody(def, rows, tabId);

  document.getElementById('content').innerHTML =
    `<div class="table-wrap"><table>` +
    `<thead><tr>${ths}</tr><tr class="filter-row">${filterCells}</tr></thead>` +
    `<tbody>${body}</tbody>` +
    `</table></div>`;

  attachFilterListeners(def, tabId);
}

const SPECIAL_TAB_COLS = {
  performance: ['symbol','close','ytdPct','highPct','high3yr','lowPct','low52wk','rsi','forwardPE'],
};

function updateRows(tabId) {
  const def = TAB_DEFS.find(t => t.id === tabId);
  const cols = def.cols || SPECIAL_TAB_COLS[tabId];
  if (!cols) return;
  const allRows = state.data[tabId] || [];
  let rows = applyFilters([...allRows], cols);
  sortRows(rows);

  const totalSourced = allRows.filter(r => matchesSources(r.symbol)).length;
  renderToolbar(rows.length, totalSourced);

  const tbody = document.querySelector('.table-wrap tbody');
  if (!tbody) return;
  tbody.innerHTML = renderTbodyHTML(rows, cols, def.pctField, tabId);
}

/* ── Formatting ── */

function fmtNum(col, v) {
  if (v == null) return '\u2014';
  if (col === 'close' || col === 'ema' || col === 'breakoutPrice' || col === 'breakdownPrice' || col === 'spikeClose' || col === 'high3yr' || col === 'low52wk') return v.toFixed(2);
  if (col === 'pct' || col === 'ytdPct' || col === 'highPct' || col === 'lowPct' || col === 'breakoutPct' || col === 'breakdownPct' || col === 'pctGain') return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
  if (col === 'rsi') return v.toFixed(1);
  if (col === 'forwardPE') return v.toFixed(1);
  return v.toLocaleString();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function enrichRows(rows, t) {
  return rows.map(r => ({
    ...r,
    pct: r[t.pctField] != null ? r[t.pctField] : null,
    ytdPct: state.statsMap[r.symbol]?.ytdPct ?? null,
    highPct: state.statsMap[r.symbol]?.highPct ?? null,
    lowPct: state.statsMap[r.symbol]?.lowPct ?? null,
    rsi: state.statsMap[r.symbol]?.rsi ?? null,
    forwardPE: state.statsMap[r.symbol]?.forwardPE ?? null,
  }));
}

/* ── Meta ── */

async function renderMeta(json) {
  const t = json.scanTime ? new Date(json.scanTime).toLocaleString() : '\u2014';
  const scanned = (json.symbolsScanned || 0).toLocaleString();
  const errs = json.errors || 0;

  let total = '';
  try {
    const cb = `_=${Date.now()}`;
    const resp = await fetch(`/symbols/us-equities.txt?${cb}`);
    if (resp.ok) {
      const text = await resp.text();
      const count = text.trim().split('\n').filter(Boolean).length;
      total = ` / ${count.toLocaleString()}`;
    }
  } catch (e) {}

  const errStyle = errs ? ' style="color:#f85149"' : '';
  document.getElementById('meta').innerHTML =
    `<span class="meta">Updated <strong>${t}</strong></span>` +
    `<span class="meta-sep">|</span>` +
    `<span class="meta"><a href="/symbols/us-equities.txt" target="_blank" class="meta-link">${scanned}${total} symbols</a></span>` +
    `<span class="meta-sep">|</span>` +
    `<span class="meta"><a href="/results/latest-errors.json" target="_blank" class="meta-link"${errStyle}>${errs} errors</a></span>`;
}

/* ── Week selector ── */

function fileURLForWeek(latestPath, week) {
  if (week === 'latest') return latestPath;
  return latestPath.replace(/\/latest([-.])/g, `/${week}$1`);
}

function formatWeekLabel(dateStr) {
  const parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const m = parseInt(parts[1], 10);
  const d = parseInt(parts[2], 10);
  return `${months[m - 1]} ${d}`;
}

function renderWeekSelector() {
  const el = document.getElementById('week-selector');
  if (state.manifest.length < 2) {
    el.style.display = 'none';
    return;
  }
  el.style.display = '';
  const latestCls = state.selectedWeek === 'latest' ? ' active' : '';
  let html = `<button class="source-btn${latestCls}" data-week="latest">Latest</button>`;
  for (const week of state.manifest) {
    const cls = state.selectedWeek === week ? ' active' : '';
    html += `<button class="source-btn${cls}" data-week="${esc(week)}">${formatWeekLabel(week)}</button>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('.source-btn').forEach(btn =>
    btn.addEventListener('click', () => switchWeek(btn.dataset.week))
  );
}

async function switchWeek(week) {
  if (week === state.selectedWeek) return;
  state.selectedWeek = week;
  renderWeekSelector();

  const cb = `_=${Date.now()}`;
  const latestURLs = [...new Set(TAB_DEFS.filter(t => t.file).map(t => t.file))];
  const weekURLs = latestURLs.map(u => fileURLForWeek(u, week));
  const statsURL = fileURLForWeek('/results/latest-stats.json', week);
  const [statsResult, ...results] = await Promise.allSettled([
    fetch(`${statsURL}?${cb}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }),
    ...weekURLs.map(u => fetch(`${u}?${cb}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })),
  ]);

  if (statsResult.status === 'fulfilled' && statsResult.value.stats) {
    state.statsMap = Object.fromEntries(statsResult.value.stats.map(s => [s.symbol, s]));
    if (statsResult.value.misc) state.statsMap._misc = statsResult.value.misc;
  } else {
    state.statsMap = {};
  }

  const byLatestUrl = {};
  latestURLs.forEach((u, i) => {
    if (results[i].status === 'fulfilled') byLatestUrl[u] = results[i].value;
  });

  const meta = byLatestUrl[latestURLs[0]] || byLatestUrl[latestURLs[1]] || byLatestUrl[latestURLs[2]];
  if (meta) renderMeta(meta);

  TAB_DEFS.forEach(t => {
    if (t.special) return;
    const json = byLatestUrl[t.file];
    if (!json) { state.data[t.id] = []; return; }
    let rows;
    if (t.key === 'weekBelow' && !json.weekBelow && json.below) {
      rows = json.below.map(r => ({...r, count: r.weeksBelow ?? r.count}));
    } else {
      rows = json[t.key] || [];
    }
    state.data[t.id] = enrichRows(rows, t);
  });

  buildSpecialTabData();

  renderTabs();
  showTab(state.activeTab);
}

/* ── Special tab rendering ── */

function showSpecialTab(def) {
  if (def.special === 'performance') return showPerformance();
  if (def.special === 'priceBreaks') return showPriceBreaks();
  if (def.special === 'sinceQuarter') return showQuarterlyTab('sinceQuarter', 'sinceQ');
  if (def.special === 'duringQuarter') return showQuarterlyTab('duringQuarter', 'duringQ');
  if (def.special === 'forwardPE') return showForwardPE();
  if (def.special === 'vixSpikes') return showVixSpikes();
  if (def.special === 'miscStats') return showMiscStats();
}

function showPerformance() {
  const perfCols = ['symbol','close','ytdPct','highPct','high3yr','lowPct','low52wk','rsi','forwardPE'];
  const allRows = (state.data['performance'] || []).map(r => ({...r}));
  let rows = applyFilters([...allRows], perfCols);
  sortRows(rows);

  const totalSourced = allRows.filter(r => matchesSources(r.symbol)).length;
  renderToolbar(rows.length, totalSourced);

  const perfDef = { cols: perfCols };
  const ths = renderTableHeader(perfDef);
  const filterCells = renderFilterRow(perfDef);

  const body = rows.length === 0
    ? `<tr><td colspan="${perfCols.length}" style="text-align:center;padding:24px;color:#8b949e">No data</td></tr>`
    : rows.map(r => renderRowHTML(r, perfCols, null, 'performance')).join('');

  document.getElementById('content').innerHTML =
    `<div class="table-wrap"><table>` +
    `<thead><tr>${ths}</tr><tr class="filter-row">${filterCells}</tr></thead>` +
    `<tbody>${body}</tbody>` +
    `</table></div>`;

  attachFilterListeners(perfDef, 'performance');
}

function showForwardPE() {
  const stats = Object.values(state.statsMap).filter(s => matchesSources(s.symbol) && s.forwardPEHistory);
  if (!stats.length) {
    renderToolbar(0, 0);
    document.getElementById('content').innerHTML = '<div class="loading">No Forward P/E data available</div>';
    return;
  }

  // Gather all quarter keys, sort chronologically
  const qKeySet = new Set();
  stats.forEach(s => Object.keys(s.forwardPEHistory).forEach(k => qKeySet.add(k)));
  const qKeys = [...qKeySet].sort((a, b) => {
    const [qa, ya] = [a[1], a.slice(3)];
    const [qb, yb] = [b[1], b.slice(3)];
    if (ya !== yb) return Number(ya) - Number(yb);
    return Number(qa) - Number(qb);
  });

  const rows = stats.map(s => {
    const row = { symbol: s.symbol, close: s.close, forwardPE: s.forwardPE ?? null };
    qKeys.forEach(k => { row[k] = s.forwardPEHistory[k] ?? null; });
    return row;
  }).filter(r => matchesSources(r.symbol));

  state.data['fwdPE'] = rows;
  renderToolbar(rows.length, rows.length);

  const fixedCols = ['symbol', 'close', 'forwardPE'];
  const allCols = [...fixedCols, ...qKeys];

  const ths = allCols.map(c => {
    const cls = c !== 'symbol' ? ' class="num"' : '';
    const label = COL_LABELS[c] || c;
    return `<th${cls}>${label}</th>`;
  }).join('');

  const tbody = rows.map(r => '<tr>' + allCols.map((c, ci) => {
    const v = r[c];
    if (c === 'symbol') {
      const url = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(v)}&interval=W`;
      return `<td class="symbol"><a href="${url}" target="_blank">${esc(v)}</a></td>`;
    }
    if (c === 'close' || c === 'forwardPE') return `<td class="num">${fmtNum(c, v)}</td>`;
    // Quarter P/E columns: green when lower than next (cheaper), red when higher (more expensive)
    if (v == null) return `<td class="num">\u2014</td>`;
    // Compare to previous quarter to determine color
    const prevIdx = ci - 1;
    const prevCol = prevIdx >= fixedCols.length ? allCols[prevIdx] : null;
    const prevVal = prevCol ? r[prevCol] : null;
    let cls = '';
    if (prevVal != null) {
      cls = v < prevVal ? 'pct-positive' : v > prevVal ? 'pct-negative' : '';
    }
    return `<td class="num ${cls}">${v.toFixed(1)}</td>`;
  }).join('') + '</tr>').join('');

  document.getElementById('content').innerHTML =
    `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${tbody || '<tr><td colspan="' + allCols.length + '" style="text-align:center;padding:24px;color:#8b949e">No data</td></tr>'}</tbody></table></div>`;
}

function showPriceBreaks() {
  const stats = Object.values(state.statsMap).filter(s => matchesSources(s.symbol));
  const breakouts = stats.filter(s => s.breakoutPct != null)
    .map(s => ({ symbol: s.symbol, close: s.close, breakoutPrice: s.breakoutPrice, breakoutDate: s.breakoutDate, breakoutPct: s.breakoutPct, rsi: s.rsi ?? null }))
    .sort((a, b) => a.breakoutPct - b.breakoutPct);
  const breakdowns = stats.filter(s => s.breakdownPct != null)
    .map(s => ({ symbol: s.symbol, close: s.close, breakdownPrice: s.breakdownPrice, breakdownDate: s.breakdownDate, breakdownPct: s.breakdownPct, rsi: s.rsi ?? null }))
    .sort((a, b) => a.breakdownPct - b.breakdownPct);

  state.data['priceBreaks'] = [...breakouts, ...breakdowns];

  const boCols = ['symbol','close','breakoutPrice','breakoutDate','breakoutPct','rsi'];
  const bdCols = ['symbol','close','breakdownPrice','breakdownDate','breakdownPct','rsi'];

  const totalCount = breakouts.length + breakdowns.length;
  renderToolbar(totalCount, totalCount);

  const makeHead = cols => cols.map(c => {
    const cls = NUM_COLS.has(c) ? ' class="num"' : '';
    return `<th${cls}>${COL_LABELS[c] || c}</th>`;
  }).join('');

  const makeBody = (rows, cols) => {
    if (!rows.length) return `<tr><td colspan="${cols.length}" style="text-align:center;padding:24px;color:#8b949e">No data</td></tr>`;
    return rows.map(r => '<tr>' + cols.map(c => {
      const v = r[c];
      if (c === 'symbol') {
        const url = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(v)}&interval=W`;
        return `<td class="symbol"><a href="${url}" target="_blank">${esc(v)}</a></td>`;
      }
      if (c === 'breakoutDate' || c === 'breakdownDate') return `<td>${esc(v || '')}</td>`;
      if (c === 'rsi' && v != null) {
        const cls = v > 70 ? 'pct-negative' : v < 30 ? 'pct-positive' : '';
        return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
      }
      if (c === 'breakoutPct' || c === 'breakdownPct') {
        const cls = v != null ? (v >= 0 ? 'pct-positive' : 'pct-negative') : '';
        return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
      }
      if (NUM_COLS.has(c)) return `<td class="num">${fmtNum(c, v)}</td>`;
      return `<td>${esc(v)}</td>`;
    }).join('') + '</tr>').join('');
  };

  document.getElementById('content').innerHTML =
    `<h3 style="color:#e6edf3;margin:0 0 8px;font-size:14px">Breakouts (${breakouts.length})</h3>` +
    `<div class="table-wrap"><table><thead><tr>${makeHead(boCols)}</tr></thead><tbody>${makeBody(breakouts, boCols)}</tbody></table></div>` +
    `<h3 style="color:#e6edf3;margin:16px 0 8px;font-size:14px">Breakdowns (${breakdowns.length})</h3>` +
    `<div class="table-wrap"><table><thead><tr>${makeHead(bdCols)}</tr></thead><tbody>${makeBody(breakdowns, bdCols)}</tbody></table></div>`;
}

function showQuarterlyTab(field, tabId) {
  const stats = Object.values(state.statsMap).filter(s => matchesSources(s.symbol) && s[field]);
  if (!stats.length) {
    renderToolbar(0, 0);
    document.getElementById('content').innerHTML = '<div class="loading">No quarterly data available</div>';
    return;
  }

  // Gather all quarter keys, sort chronologically
  const qKeySet = new Set();
  stats.forEach(s => Object.keys(s[field]).forEach(k => qKeySet.add(k)));
  const qKeys = [...qKeySet].sort((a, b) => {
    const [qa, ya] = [a[1], a.slice(3)];
    const [qb, yb] = [b[1], b.slice(3)];
    if (ya !== yb) return Number(ya) - Number(yb);
    return Number(qa) - Number(qb);
  });

  const rows = stats.map(s => {
    const row = { symbol: s.symbol, close: s.close, highPct: s.highPct };
    qKeys.forEach(k => { row[k] = s[field][k] ?? null; });
    return row;
  }).filter(r => matchesSources(r.symbol));

  state.data[tabId] = rows;
  renderToolbar(rows.length, rows.length);

  const fixedCols = ['symbol', 'close', 'highPct'];
  const allCols = [...fixedCols, ...qKeys];

  const ths = allCols.map(c => {
    const cls = c !== 'symbol' ? ' class="num"' : '';
    const label = COL_LABELS[c] || c;
    return `<th${cls}>${label}</th>`;
  }).join('');

  const tbody = rows.map(r => '<tr>' + allCols.map(c => {
    const v = r[c];
    if (c === 'symbol') {
      const url = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(v)}&interval=W`;
      return `<td class="symbol"><a href="${url}" target="_blank">${esc(v)}</a></td>`;
    }
    if (c === 'close') return `<td class="num">${fmtNum(c, v)}</td>`;
    if (c === 'highPct') {
      const cls = v != null ? (v >= -5 ? 'pct-positive' : 'pct-negative') : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    // Quarter columns
    if (v == null) return `<td class="num">\u2014</td>`;
    const cls = v >= 0 ? 'pct-positive' : 'pct-negative';
    return `<td class="num ${cls}">${(v > 0 ? '+' : '') + v.toFixed(2)}%</td>`;
  }).join('') + '</tr>').join('');

  document.getElementById('content').innerHTML =
    `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${tbody || '<tr><td colspan="' + allCols.length + '" style="text-align:center;padding:24px;color:#8b949e">No data</td></tr>'}</tbody></table></div>`;
}

function showVixSpikes() {
  const stats = Object.values(state.statsMap).filter(s => matchesSources(s.symbol) && s.vixReturns && s.vixReturns.length);
  if (!stats.length) {
    renderToolbar(0, 0);
    document.getElementById('content').innerHTML = '<div class="loading">No VIX spike data available</div>';
    return;
  }

  // Gather spike dates in order
  const spikeDateSet = new Set();
  stats.forEach(s => s.vixReturns.forEach(vr => spikeDateSet.add(vr.dateString)));
  const spikeDates = [...spikeDateSet];

  // Build spike labels with VIX close
  const spikeMeta = {};
  stats.forEach(s => s.vixReturns.forEach(vr => {
    if (!spikeMeta[vr.dateString]) spikeMeta[vr.dateString] = vr.vixClose;
  }));
  const spikeLabels = {};
  spikeDates.forEach(d => {
    spikeLabels[d] = `${d} (${spikeMeta[d]?.toFixed(1) || ''})`;
  });

  const rows = stats.map(s => {
    const row = { symbol: s.symbol, close: s.close, highPct: s.highPct };
    const byDate = {};
    s.vixReturns.forEach(vr => { byDate[vr.dateString] = vr.pctGain; });
    spikeDates.forEach(d => { row['spike_' + d] = byDate[d] ?? null; });
    return row;
  });

  state.data['vixSpikes'] = rows;
  renderToolbar(rows.length, rows.length);

  const fixedCols = ['symbol', 'close', 'highPct'];
  const spikeCols = spikeDates.map(d => 'spike_' + d);
  const allCols = [...fixedCols, ...spikeCols];

  const ths = allCols.map(c => {
    if (c === 'symbol') return `<th>${COL_LABELS[c]}</th>`;
    const label = c.startsWith('spike_') ? spikeLabels[c.replace('spike_', '')] : (COL_LABELS[c] || c);
    return `<th class="num">${label}</th>`;
  }).join('');

  const tbody = rows.map(r => '<tr>' + allCols.map(c => {
    const v = r[c];
    if (c === 'symbol') {
      const url = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(v)}&interval=W`;
      return `<td class="symbol"><a href="${url}" target="_blank">${esc(v)}</a></td>`;
    }
    if (c === 'close') return `<td class="num">${fmtNum(c, v)}</td>`;
    if (c === 'highPct') {
      const cls = v != null ? (v >= -5 ? 'pct-positive' : 'pct-negative') : '';
      return `<td class="num ${cls}">${fmtNum(c, v)}</td>`;
    }
    if (v == null) return `<td class="num">\u2014</td>`;
    const cls = v >= 0 ? 'pct-positive' : 'pct-negative';
    return `<td class="num ${cls}">${(v > 0 ? '+' : '') + v.toFixed(2)}%</td>`;
  }).join('') + '</tr>').join('');

  document.getElementById('content').innerHTML =
    `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${tbody || '<tr><td colspan="' + allCols.length + '" style="text-align:center;padding:24px;color:#8b949e">No data</td></tr>'}</tbody></table></div>`;
}

function showMiscStats() {
  const misc = state.miscStats || {};
  document.getElementById('toolbar').innerHTML = '';

  // Compute sector and index stats from statsMap in the frontend
  const sectorStats = Object.values(state.statsMap).filter(s => s.symbol && SPDR_SECTORS.has(s.symbol));
  const indexStats = Object.values(state.statsMap).filter(s => s.symbol && INDEX_SYMBOLS.has(s.symbol));
  const sectorNearHigh = sectorStats.length ? (sectorStats.filter(s => s.highPct != null && s.highPct >= -5).length / sectorStats.length * 100).toFixed(1) + '%' : '\u2014';
  const indexNearHigh = indexStats.length ? (indexStats.filter(s => s.highPct != null && s.highPct >= -5).length / indexStats.length * 100).toFixed(1) + '%' : '\u2014';
  const sectorPositiveYTD = sectorStats.length ? (sectorStats.filter(s => s.ytdPct != null && s.ytdPct >= 0).length / sectorStats.length * 100).toFixed(1) + '%' : '\u2014';

  const cards = [
    { label: 'Within 5% of High', value: misc.pctWithin5OfHigh != null ? misc.pctWithin5OfHigh.toFixed(1) + '%' : '\u2014' },
    { label: 'Indexes Near High', value: indexNearHigh },
    { label: 'Sectors Near High', value: sectorNearHigh },
    { label: 'Positive YTD', value: misc.pctPositiveYTD != null ? misc.pctPositiveYTD.toFixed(1) + '%' : '\u2014' },
    { label: 'Sectors Positive YTD', value: sectorPositiveYTD },
    { label: 'Avg YTD', value: misc.avgYTD != null ? (misc.avgYTD > 0 ? '+' : '') + misc.avgYTD.toFixed(2) + '%' : '\u2014', color: misc.avgYTD != null ? (misc.avgYTD >= 0 ? '#3fb950' : '#f85149') : null },
    { label: 'Avg Fwd P/E', value: misc.avgForwardPE != null ? misc.avgForwardPE.toFixed(1) : '\u2014' },
    { label: 'Median Fwd P/E', value: misc.medianForwardPE != null ? misc.medianForwardPE.toFixed(1) : '\u2014' },
    { label: 'Above 5wk EMA', value: misc.pctAbove5wkEMA != null ? misc.pctAbove5wkEMA.toFixed(1) + '%' : '\u2014', color: misc.pctAbove5wkEMA != null ? '#3fb950' : null },
    { label: 'Below 5wk EMA', value: misc.pctBelow5wkEMA != null ? misc.pctBelow5wkEMA.toFixed(1) + '%' : '\u2014', color: misc.pctBelow5wkEMA != null ? '#f85149' : null },
  ];

  const html = `<div style="display:flex;flex-wrap:wrap;gap:16px;padding:8px 0">` +
    cards.map(c => {
      const colorStyle = c.color ? ` style="color:${c.color}"` : '';
      return `<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px 28px;min-width:180px;flex:1">` +
        `<div style="color:#8b949e;font-size:12px;margin-bottom:6px">${c.label}</div>` +
        `<div style="font-size:24px;font-weight:600;color:#e6edf3"${colorStyle}>${c.value}</div>` +
        `</div>`;
    }).join('') +
    `</div>`;

  document.getElementById('content').innerHTML = html;
}

function buildSpecialTabData() {
  const stats = Object.values(state.statsMap).filter(s => s.symbol);
  state.data['performance'] = stats.map(s => ({
    symbol: s.symbol,
    close: s.close ?? null,
    ytdPct: s.ytdPct ?? null,
    highPct: s.highPct ?? null,
    high3yr: s.high3yr ?? null,
    lowPct: s.lowPct ?? null,
    low52wk: s.low52wk ?? null,
    rsi: s.rsi ?? null,
    forwardPE: s.forwardPE ?? null,
  }));
  state.data['priceBreaks'] = stats.filter(s => s.breakoutPct != null || s.breakdownPct != null);
  state.data['sinceQ'] = stats.filter(s => s.sinceQuarter);
  state.data['duringQ'] = stats.filter(s => s.duringQuarter);
  state.data['fwdPE'] = stats.filter(s => s.forwardPEHistory);
  state.data['vixSpikes'] = stats.filter(s => s.vixReturns && s.vixReturns.length);
  state.data['miscStats'] = [];
  state.miscStats = state.statsMap._misc || {};
}

/* ── Fetch & init ── */

async function fetchAll() {
  readHash();

  const cb = `_=${Date.now()}`;
  const urls = [...new Set(TAB_DEFS.filter(t => t.file).map(t => t.file))];
  const [manifestResult, statsResult, ...results] = await Promise.allSettled([
    fetch(`/results/manifest.json?${cb}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }),
    fetch(`/results/latest-stats.json?${cb}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }),
    ...urls.map(u => fetch(`${u}?${cb}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })),
  ]);

  if (manifestResult.status === 'fulfilled') {
    const mv = manifestResult.value;
    state.manifest = Array.isArray(mv) ? mv : (mv.weeks || []);
  }

  if (statsResult.status === 'fulfilled' && statsResult.value.stats) {
    state.statsMap = Object.fromEntries(statsResult.value.stats.map(s => [s.symbol, s]));
    if (statsResult.value.misc) state.statsMap._misc = statsResult.value.misc;
  }

  const byUrl = {};
  urls.forEach((u, i) => {
    if (results[i].status === 'fulfilled') byUrl[u] = results[i].value;
  });

  const meta = byUrl[urls[0]] || byUrl[urls[1]] || byUrl[urls[2]];
  if (meta) renderMeta(meta);

  TAB_DEFS.forEach(t => {
    if (t.special) return;
    const json = byUrl[t.file];
    if (!json) { state.data[t.id] = []; return; }
    // Backward compat: old format had "below" with "weeksBelow" field
    let rows;
    if (t.key === 'weekBelow' && !json.weekBelow && json.below) {
      rows = json.below.map(r => ({...r, count: r.weeksBelow ?? r.count}));
    } else {
      rows = json[t.key] || [];
    }
    state.data[t.id] = enrichRows(rows, t);
  });

  buildSpecialTabData();

  if (!Object.values(byUrl).length) {
    document.getElementById('content').innerHTML = '<div class="error-msg">Failed to load scan data.</div>';
    return;
  }

  initDefaultFilters();
  renderSourceToggles();
  renderWeekSelector();
  renderTabs();
  writeHash();
  showTab(state.activeTab);
}

fetchAll();
